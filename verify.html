<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flag Verification</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .button-group { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 12px; z-index: 40; }
        .button-group button { padding: 12px 24px; background: linear-gradient(180deg, rgba(0,26,22,0.55), rgba(0,0,0,0.48)); border: 1.5px solid #00ffcc; color: #00ffcc; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.24s ease; border-radius: 16px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 8px 18px rgba(0,255,204,0.18); position: relative; overflow: hidden; }
        .button-group button::before { content: ''; position: absolute; top: -120%; left: -40%; width: 36%; height: 320%; background: linear-gradient(90deg, rgba(255,255,255,0), rgba(208,255,246,0.75), rgba(255,255,255,0)); transform: rotate(18deg) translateX(-220%); opacity: 0; pointer-events: none; }
        .button-group button:hover { transform: translateY(-4px) scale(1.03); background: rgba(0,255,204,0.14); box-shadow: 0 0 20px rgba(0,255,204,0.82), 0 0 36px rgba(0,255,204,0.38), 0 10px 22px rgba(0,0,0,0.35); }
        .button-group button:hover::before { opacity: 0.95; animation: verifySweep 0.95s cubic-bezier(.2,.8,.2,1) forwards; }
        @keyframes verifySweep { from { transform: rotate(18deg) translateX(-220%); } to { transform: rotate(18deg) translateX(360%); } }
        
        /* Winner Modal Styles */
        .winner-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            perspective: 1000px;
        }
        .winner-overlay[aria-hidden="false"] { display: flex; }
        
        .winner-backdrop {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,215,0,0.15), rgba(0,0,0,0.92));
            backdrop-filter: blur(10px);
            animation: backdropPulse 3s ease-in-out infinite;
        }
        
        @keyframes backdropPulse {
            0%, 100% { background: radial-gradient(circle at center, rgba(255,215,0,0.15), rgba(0,0,0,0.92)); }
            50% { background: radial-gradient(circle at center, rgba(255,215,0,0.25), rgba(0,0,0,0.88)); }
        }
        
        .winner-card {
            position: relative;
            width: 600px;
            max-width: 90%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border: 3px solid transparent;
            background-clip: padding-box;
            box-shadow: 
                0 0 60px rgba(255,215,0,0.4),
                0 0 100px rgba(255,215,0,0.2),
                inset 0 0 80px rgba(255,215,0,0.1);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            animation: cardEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1), cardFloat 4s ease-in-out infinite 1s;
            transform-style: preserve-3d;
        }
        
        .winner-card::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF6347, #FF1493, #8A2BE2, #4169E1, #00CED1, #00FF7F);
            background-size: 400% 400%;
            border-radius: 30px;
            z-index: -1;
            animation: gradientShift 3s ease infinite;
            filter: blur(2px);
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes cardEntrance {
            0% { 
                transform: scale(0.3) rotateY(-30deg) translateY(-100px);
                opacity: 0;
            }
            60% {
                transform: scale(1.05) rotateY(5deg) translateY(0);
            }
            100% { 
                transform: scale(1) rotateY(0deg) translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px) rotateZ(0deg); }
            50% { transform: translateY(-20px) rotateZ(1deg); }
        }
        
        .trophy-animation {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            animation: trophySpin 2s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(255,215,0,0.6));
        }
        
        .trophy-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px gold);
        }
        
        @keyframes trophySpin {
            0%, 100% { transform: rotateY(0deg) scale(1); }
            25% { transform: rotateY(180deg) scale(1.1); }
            50% { transform: rotateY(360deg) scale(1); }
            75% { transform: rotateY(540deg) scale(1.1); }
        }
        
        .winner-title {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            animation: titleShine 2s linear infinite;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            letter-spacing: 2px;
        }
        
        @keyframes titleShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .winner-message {
            font-size: 22px;
            color: #fff;
            margin: 20px 0;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .winner-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 15px;
            padding: 20px 30px;
            min-width: 100px;
            animation: statPulse 1.5s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.2s);
        }
        
        .stat-box:nth-child(1) { --i: 0; }
        .stat-box:nth-child(2) { --i: 1; }
        .stat-box:nth-child(3) { --i: 2; }
        
        @keyframes statPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,215,0,0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,215,0,0.6); }
        }
        
        .stat-num {
            display: block;
            font-size: 36px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
        }
        
        .stat-label {
            display: block;
            font-size: 14px;
            color: #fff;
            text-transform: uppercase;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        
        .winner-prize {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            border: 2px dashed #FFD700;
            animation: prizePulse 1s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255,215,0,0.6);
        }
        
        @keyframes prizePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .winner-close-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .winner-close-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255,215,0,0.6);
        }
        
        #confetti-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        /* Mobile responsive styles for winner modal */
        @media (max-width: 768px) {
            .winner-card {
                width: auto;
                max-width: 95%;
                padding: 35px 25px;
            }
            
            .winner-title {
                font-size: 36px;
                letter-spacing: 1px;
            }
            
            .winner-message {
                font-size: 18px;
            }
            
            .winner-stats {
                gap: 12px;
                flex-wrap: wrap;
            }
            
            .stat-box {
                padding: 15px 20px;
                min-width: 80px;
            }
            
            .stat-num {
                font-size: 28px;
            }
            
            .stat-label {
                font-size: 12px;
            }
            
            .winner-prize {
                font-size: 18px;
                padding: 15px;
            }
            
            .winner-close-btn {
                padding: 12px 35px;
                font-size: 16px;
            }
            
            .trophy-animation {
                width: 100px;
                height: 100px;
                margin: 0 auto 20px;
            }
        }
        
        @media (max-width: 480px) {
            .winner-card {
                padding: 25px 18px;
                max-width: 96%;
            }
            
            .winner-title {
                font-size: 28px;
                letter-spacing: 0.5px;
            }
            
            .winner-message {
                font-size: 16px;
                line-height: 1.5;
            }
            
            .winner-stats {
                gap: 10px;
            }
            
            .stat-box {
                padding: 12px 16px;
                min-width: 70px;
            }
            
            .stat-num {
                font-size: 24px;
            }
            
            .stat-label {
                font-size: 11px;
            }
            
            .winner-prize {
                font-size: 16px;
                padding: 12px;
                margin: 20px 0;
            }
            
            .winner-close-btn {
                padding: 14px 30px;
                font-size: 15px;
                width: 100%;
            }
            
            .trophy-animation {
                width: 80px;
                height: 80px;
                margin: 0 auto 15px;
            }
        }
    </style>
</head>
<body>

<div class="bg-image"></div>
<canvas id="matrix"></canvas>

<div class="container">
    <h1 class="glitch" data-text="FLAG VERIFICATION">FLAG VERIFICATION</h1>
    <p class="subtitle">Submit your flags to prove your mastery.</p>

    <button onclick="showVerifyModal()">VERIFY FLAGS</button>
</div>

<div class="button-group">
    <button onclick="window.location='control-room.html'">TO CONTROL ROOM</button>
    <button onclick="resetProgress()" style="background: rgba(255,0,0,0.1); border-color: #ff4444; color: #ff4444;">RESET PROGRESS</button>
    <button onclick="window.location='overwatch.html'">OVERWATCH</button>
</div>
<!-- Winner celebration modal -->
<div id="winner-modal" class="winner-overlay" aria-hidden="true">
    <div class="winner-backdrop"></div>
    <div class="winner-card">
        <div class="trophy-animation">
            <svg viewBox="0 0 100 100" class="trophy-svg">
                <path d="M30 25 L30 15 Q30 10 35 10 L65 10 Q70 10 70 15 L70 25" fill="none" stroke="gold" stroke-width="2"/>
                <ellipse cx="50" cy="25" rx="20" ry="8" fill="gold" opacity="0.3"/>
                <path d="M35 25 Q35 50 50 55 Q65 50 65 25" fill="gold"/>
                <rect x="45" y="55" width="10" height="15" fill="gold"/>
                <ellipse cx="50" cy="70" rx="15" ry="5" fill="gold"/>
                <circle cx="50" cy="40" r="8" fill="#FFD700" opacity="0.6"/>
                <text x="50" y="44" font-size="10" fill="#000" text-anchor="middle" font-weight="bold">1ST</text>
            </svg>
        </div>
        <h1 class="winner-title">🎉 CHAMPION HACKER 🎉</h1>
        <p class="winner-message">You've conquered all challenges!<br/>All flags verified successfully.</p>
        <div class="winner-stats">
            <div class="stat-box"><span class="stat-num">8</span><span class="stat-label">Easy</span></div>
            <div class="stat-box"><span class="stat-num">7</span><span class="stat-label">Medium</span></div>
            <div class="stat-box"><span class="stat-num">2</span><span class="stat-label">Hard</span></div>
        </div>
        <p class="winner-prize">💰 Report to CTF Admin to claim your CASH PRIZE! 💰</p>
        <button class="winner-close-btn" onclick="closeWinnerModal()">AWESOME!</button>
    </div>
    <canvas id="confetti-canvas"></canvas>
</div>
<!-- Flag verification modal -->
<div id="verify-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="verify-modal-title">
        <h2 id="verify-modal-title">Flag Submission</h2>
        <p class="modal-desc">Enter the flag to verify your progress.</p>
        <form id="verify-form">
            <label class="field">
                <span class="label-text">Flag</span>
                <input id="verify-flag" name="flag" type="text" required autocomplete="off" placeholder="FLAG{...}" />
            </label>
            <div class="modal-actions">
                <button type="submit" class="btn primary">Verify</button>
                <button type="button" class="btn" id="verify-cancel">Cancel</button>
            </div>
            <div class="modal-status" id="verify-status" aria-live="polite"></div>
        </form>
    </div>
</div>

<script src="script.js"></script>
<script>
window.addEventListener('load', () => {
    document.body.classList.add('loaded');
    initMatrix();
    setTimeout(() => {
        const hdr = document.querySelector('.glitch');
        if (hdr) hdr.classList.add('glitch-animate');
    }, 520);
    setTimeout(() => {
        animateSubtitle();
    }, 720);
    setTimeout(() => {
        decryptHeader();
    }, 600);
});

document.addEventListener('decryptComplete', checkAndShowVerifyModal);
document.addEventListener('subtitleComplete', checkAndShowVerifyModal);
let __verifyReady = { decrypt: false, subtitle: false };
function checkAndShowVerifyModal(e) {
    if (e.type === 'decryptComplete') __verifyReady.decrypt = true;
    if (e.type === 'subtitleComplete') __verifyReady.subtitle = true;
    if (__verifyReady.decrypt && __verifyReady.subtitle) {
        setTimeout(showVerifyModal, 400);
    }
}

function showVerifyModal() {
    const modal = document.getElementById('verify-modal');
    if (!modal) return;
    modal.setAttribute('aria-hidden', 'false');
    const card = modal.querySelector('.modal-card');
    if (card) {
        card.classList.add('jump-animate');
    }
    setTimeout(() => {
        const flagInput = document.getElementById('verify-flag');
        if (flagInput) flagInput.focus();
    }, 120);
    
    const form = document.getElementById('verify-form');
    const cancel = document.getElementById('verify-cancel');
    if (form && !form._wired) {
        form.addEventListener('submit', async (ev) => {
            ev.preventDefault();
            await submitFlag(form);
        });
        cancel.addEventListener('click', () => {
            modal.setAttribute('aria-hidden', 'true');
        });
        form._wired = true;
    }
}

function getProgress() {
    const stored = localStorage.getItem('ctf_verified_flags');
    return stored ? JSON.parse(stored) : { easy: [], medium: [], hard: [] };
}

function saveProgress(progress) {
    localStorage.setItem('ctf_verified_flags', JSON.stringify(progress));
    updateProgressDisplay();
    checkWinCondition(progress);
}

function checkWinCondition(progress) {
    const easy = progress.easy.length;
    const medium = progress.medium.length;
    const hard = progress.hard.length;
    if (easy >= 8 && medium >= 7 && hard >= 2) {
        setTimeout(() => {
            showWinnerModal();
        }, 1500);
    }
}

function showWinnerModal() {
    const modal = document.getElementById('winner-modal');
    if (!modal) return;
    modal.setAttribute('aria-hidden', 'false');
    startConfetti();
}

function closeWinnerModal() {
    const modal = document.getElementById('winner-modal');
    if (modal) modal.setAttribute('aria-hidden', 'true');
    stopConfetti();
}

function resetProgress() {
    if (confirm('Reset all flag progress? This will clear all verified flags.')) {
        localStorage.removeItem('ctf_verified_flags');
        updateProgressDisplay();
        alert('Progress reset to 0/17. Ready for next test run.');
    }
}

function startConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const particles = [];
    const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
    
    for (let i = 0; i < 150; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 4 + 2,
            d: Math.random() * 2 + 1,
            color: colors[Math.floor(Math.random() * colors.length)],
            tilt: Math.random() * 10 - 5,
            tiltAngle: 0,
            tiltAngleIncrement: Math.random() * 0.1 + 0.05
        });
    }
    
    let animationId;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let p of particles) {
            ctx.beginPath();
            ctx.lineWidth = p.r;
            ctx.strokeStyle = p.color;
            ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.r / 2);
            ctx.stroke();
            
            p.tiltAngle += p.tiltAngleIncrement;
            p.tilt = Math.sin(p.tiltAngle) * 15;
            p.y += p.d;
            
            if (p.y > canvas.height) {
                p.y = -10;
                p.x = Math.random() * canvas.width;
            }
        }
        
        animationId = requestAnimationFrame(draw);
    }
    
    draw();
    canvas.dataset.animationId = animationId;
}

function stopConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    const animationId = canvas.dataset.animationId;
    if (animationId) {
        cancelAnimationFrame(parseInt(animationId));
    }
}


function updateProgressDisplay() {
    const progress = getProgress();
    const easy = progress.easy ? progress.easy.length : 0;
    const medium = progress.medium ? progress.medium.length : 0;
    const hard = progress.hard ? progress.hard.length : 0;
    const total = easy + medium + hard;
    const max = 8 + 7 + 2;
    const progressDiv = document.getElementById('progress-display') || createProgressDisplay();
    progressDiv.innerHTML = `<strong>Flags Verified:</strong> Easy: ${easy}/8 | Medium: ${medium}/7 | Hard: ${hard}/2 (Total: ${total}/${max})`;
}

function createProgressDisplay() {
    const div = document.createElement('div');
    div.id = 'progress-display';
    div.style.cssText = 'padding: 12px; background: rgba(0,255,204,0.1); border: 1px solid rgba(0,255,204,0.3); border-radius: 6px; margin-top: 12px; font-size: 13px; color: #00ffcc;';
    const container = document.querySelector('.container');
    if (container) container.insertBefore(div, container.lastChild);
    return div;
}

function getApiBaseUrl() {
    const host = window.location.hostname;
    const protocol = window.location.protocol;
    const isLocalhost = host === 'localhost' || host === '127.0.0.1';
    const isFile = protocol === 'file:';
    if (isLocalhost || isFile) return 'http://localhost:3000';
    return window.location.origin;
}

function getPlayerName() {
    return (localStorage.getItem('ctf_player_name') || '').trim();
}

async function submitFlag(form) {
    const status = document.getElementById('verify-status');
    const flag = document.getElementById('verify-flag').value.trim();
    const playerName = getPlayerName();
    if (!playerName) {
        status.style.color = '#ffd1d1';
        status.textContent = 'Verify from the landing page first so Overwatch can track your score.';
        return;
    }
    if (!flag) {
        status.textContent = 'Please enter a flag.';
        return;
    }
    status.innerHTML = '<span class="spinner"></span> Verifying...';
    try {
        const url = `${getApiBaseUrl()}/verify-flag`;
        console.log('[CTF] Verifying flag at:', url);
        const res = await fetch(url, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ flag: flag, playerName })
        });
        
        if (!res.ok) {
            const errText = await res.text();
            console.error('[CTF] Server error:', res.status, errText);
            throw new Error(`Server ${res.status}`);
        }
        
        const j = await res.json();
        console.log('[CTF] Server response:', j);
        
        if (j && j.valid) {
            const progress = getProgress();
            const difficulty = j.difficulty || 'easy';
            if (!progress[difficulty]) progress[difficulty] = [];
            if (!progress[difficulty].includes(flag)) {
                progress[difficulty].push(flag);
                saveProgress(progress);
            }
            status.style.color = '#bfffcf';
            if (typeof j.pointsAwarded === 'undefined' || typeof j.score === 'undefined') {
                status.style.color = '#ffd1d1';
                status.textContent = 'Flag verified, but server is outdated for Overwatch scoring. Restart server.js.';
                return;
            }
            if (j.duplicate) {
                status.textContent = `✓ Flag already counted for ${playerName}. Score stays ${j.score}/${j.maxScore}.`;
            } else {
                status.textContent = `✓ Flag verified! +${j.pointsAwarded} points • Score ${j.score}/${j.maxScore}`;
            }
            document.getElementById('verify-flag').value = '';
            setTimeout(() => {
                document.getElementById('verify-modal').setAttribute('aria-hidden', 'true');
            }, 1200);
        } else {
            status.style.color = '#ffd1d1';
            status.textContent = j.message || 'Flag not recognized. Try again.';
        }
    } catch (err) {
        status.style.color = '#ffd1d1';
        const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        status.textContent = isDev ? `Error: ${err.message}` : 'Verification failed. Please try again.';
        console.error('[CTF] Error:', err);
    }
}

window.addEventListener('load', () => {
    updateProgressDisplay();
});
</script>
</body>
</html>
